<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigLinker — 대입토탈리드코칭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --header-bg: #f6f7fb; --header-surface: #ffffff; --header-line: #e5e8ef;
      --header-line-strong: #d7dbe5; --header-text: #17191f; --header-muted: #6e7687;
      --bg: #0b0e13; --bg-soft: #121722; --bg-dark: #090c11; --panel: #f5f6fb;
      --text: #f6f7fb; --muted: rgba(255,255,255,0.66); --muted-dark: #5d6473;
      --brand: #4a68ff; --brand-2: #7f92ff; --brand-soft: #eef0ff;
      --max: 1320px; --radius-xl: 28px; --radius-lg: 22px; --radius-md: 18px;
      --radius-sm: 12px; --radius-xs: 8px;
      --shadow: 0 24px 60px rgba(0,0,0,0.28); --shadow-card: 0 18px 36px rgba(36,46,78,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Noto Sans KR", "Pretendard", sans-serif;
      background: radial-gradient(circle at 50% 0%, rgba(66,104,255,0.12), transparent 18%),
        linear-gradient(180deg, #090b0f 0%, #0b0e13 32%, #0d1015 100%);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 28px; }
    .inner { max-width: var(--max); margin: 0 auto; padding: 0 20px; }

    /* ── HEADER ── */
    .top-shell {
      position: sticky; top: 0; z-index: 120;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--header-line);
    }
    .sticky-category-shell {
      position: sticky; top: 0; z-index: 110;
      background: rgba(247,248,252,0.98);
      border-top: 1px solid #edf0f6; border-bottom: 1px solid var(--header-line);
      backdrop-filter: blur(12px);
    }
    .family-bar { background: #fff; }
    .family-outer { display: flex; justify-content: center; padding: 10px 0; }
    .family-wrap {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 46px; padding: 4px; border: 1px solid var(--header-line-strong);
      border-radius: 16px; background: #fff; box-shadow: 0 4px 16px rgba(32,43,73,0.08);
      overflow-x: auto; scrollbar-width: none; white-space: nowrap;
    }
    .family-wrap::-webkit-scrollbar, .category-tabs::-webkit-scrollbar { display: none; }
    .family-link { flex: 0 0 auto; padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--header-muted); }
    .family-link.is-active { background: var(--brand-soft); color: var(--brand); }
    .main-header { background: #fff; }
    .main-header-wrap { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; min-height: 78px; }
    .header-promo {
      justify-self: start; align-self: stretch; display: flex; align-items: center;
      padding: 0 16px; border-radius: 0 0 14px 14px; border: 1px solid #dfe3ff; border-top: 0;
      background: linear-gradient(180deg, #eef2ff 0%, #f6f8ff 100%);
      color: var(--brand); font-size: 13px; font-weight: 800; white-space: nowrap;
    }
    .brand { display: flex; flex-direction: column; align-items: center; justify-self: center; text-align: center; gap: 6px; }
    .brand-mark { width: 132px; height: 44px; object-fit: contain; }
    .brand-copy span { display: block; color: var(--header-muted); font-size: 12px; line-height: 1.45; }
    .header-actions { display: flex; align-items: center; justify-self: end; gap: 8px; }
    .cta-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 14px; border-radius: 12px; border: 1px solid var(--brand); background: var(--brand); color: #fff; font-weight: 700; font-size: 13px; }
    .category-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; min-height: 58px; gap: 12px; }
    .category-balance { justify-self: start; width: 120px; }
    .category-tabs { display: flex; align-items: center; justify-content: center; gap: 2px; overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
    .category-tab { flex: 0 0 auto; position: relative; padding: 0 16px; min-height: 48px; display: inline-flex; align-items: center; font-size: 14px; font-weight: 700; color: var(--header-muted); }
    .category-tab.is-active { color: var(--brand); }
    .category-tab.is-active::after { content: ""; position: absolute; left: 16px; right: 16px; bottom: 0; height: 3px; background: var(--brand); border-radius: 999px; }
    .category-utility { display: flex; align-items: center; justify-self: end; gap: 6px; width: 240px; }
    .utility-link { display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; border-radius: 999px; border: 1px solid #e4e7ef; background: #f8f9fc; color: #6f7786; font-size: 12px; font-weight: 700; cursor: pointer; }
    .utility-link:hover { background: var(--brand-soft); color: var(--brand); }

    /* ── HERO ── */
    .hero { padding: 100px 0 80px; text-align: center; }
    .hero-kicker { display: inline-flex; align-items: center; gap: 6px; min-height: 30px; padding: 0 14px; border-radius: 999px; border: 1px solid rgba(127,146,255,0.3); background: rgba(74,104,255,0.1); font-size: 12px; font-weight: 700; color: var(--brand-2); margin-bottom: 28px; }
    .hero h1 { max-width: 780px; margin: 0 auto 20px; font-size: clamp(30px,4.6vw,60px); line-height: 1.14; letter-spacing: -0.05em; font-weight: 700; color: var(--text); }
    .hero h1 em { color: var(--brand-2); font-style: normal; }
    .hero p { max-width: 560px; margin: 0 auto 36px; color: var(--muted); font-size: 15px; line-height: 1.8; }
    .hero-actions { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .btn-primary { display: inline-flex; align-items: center; justify-content: center; min-height: 54px; padding: 0 28px; border-radius: 13px; font-size: 15px; font-weight: 700; background: var(--brand); color: #fff; box-shadow: 0 10px 28px rgba(74,104,255,0.28); transition: transform 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary { display: inline-flex; align-items: center; justify-content: center; min-height: 54px; padding: 0 24px; border-radius: 13px; font-size: 15px; font-weight: 700; border: 1.5px solid rgba(255,255,255,0.22); color: var(--text); background: rgba(255,255,255,0.06); transition: transform 0.2s; }
    .btn-secondary:hover { transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="top-shell" id="topShell">
    <div class="family-bar">
      <div class="inner">
        <div class="family-outer">
          <div class="family-wrap">
            <a class="family-link is-active" href="https://transfer.gobiglinker.com/">대학&amp;편입</a>
            <a class="family-link" href="https://graduate.gobiglinker.com/">대학원&amp;논문</a>
            <a class="family-link" href="https://job.gobiglinker.com/">취업</a>
            <a class="family-link" href="https://biz.gobiglinker.com/">기업교육</a>
          </div>
        </div>
      </div>
    </div>
    <header class="main-header">
      <div class="inner">
        <div class="main-header-wrap">
          <div class="header-promo">2026 합격전략 가이드 오픈</div>
          <a class="brand" href="./index.html">
            <img class="brand-mark" src="./assets/biglinker-logo.png" alt="빅링커 로고">
            <div class="brand-copy"><span>입시·대학원·학업계획서·논문·면접 코칭 전문</span></div>
          </a>
          <div class="header-actions">
            <a class="cta-btn" href="#">상담 신청</a>
          </div>
        </div>
      </div>
    </header>
  </div>

  <div class="sticky-category-shell">
    <div class="inner">
      <div class="category-row">
        <div class="category-balance" aria-hidden="true"></div>
        <nav class="category-tabs" aria-label="서비스 카테고리">
          <a class="category-tab is-active" href="./total-admission-coaching.html">대입토탈리드코칭</a>
          <a class="category-tab" href="./school-record-coaching.html">생기부리드코칭</a>
          <a class="category-tab" href="./interview-coaching.html">면접리드코칭</a>
          <a class="category-tab" href="./essay-coaching.html">논술리드코칭</a>
        </nav>
        <div class="category-utility" aria-label="콘텐츠 바로가기">
          <button class="utility-link" type="button">블로그</button>
          <button class="utility-link" type="button">리얼 TIP</button>
        </div>
      </div>
    </div>
  </div>

  <section class="hero">
    <div class="wrap">
      <div class="hero-kicker">대학&amp;편입 · BigLinker</div>
      <h1>대입 전략을<br><em>토탈 리드</em>합니다</h1>
      <p>수시·정시·편입까지, 입시의 모든 과정을 빅링커 전문 코치가 처음부터 끝까지 함께 설계합니다.</p>
      <div class="hero-actions">
        <a class="btn-primary" href="#">무료 상담 신청</a>
        <a class="btn-secondary" href="./index.html">서비스 전체 보기</a>
      </div>
    </div>
  </section>

</body>
</html>
